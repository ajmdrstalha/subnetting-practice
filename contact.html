<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Subnetting Practice</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1>Subnetting Practice</h1>
      <nav class="nav">
        <a href="index.html" class="nav__link">Home</a>
        <a href="about.html" class="nav__link">About</a>
        <a href="privacy.html" class="nav__link">Privacy</a>
        <a href="contact.html" class="nav__link">Contact</a>
      </nav>
      <p>Questions or feedback? Send a message.</p>
    </header>

    <main class="card">
      <h2>Contact</h2>
      <form class="form">
        <div class="form__row">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Your name" />
        </div>
        <div class="form__row">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="form__row">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="How can we help?"></textarea>
        </div>
        <div class="form__actions">
          <button type="submit" class="btn btn--primary">Submit</button>
        </div>
      </form>
    </main>

    <footer class="app__footer">
      <small>Tip: Answers must be valid IPv4 dotted-decimal addresses.</small>
    </footer>
  </div>
</body>
</html>
